<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 380" width="1280" height="380" role="img" aria-label="Outdegree — a local-only map of how you browse">
  <defs>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16a6c9"/>
      <stop offset="0.35" stop-color="#5b73f0"/>
      <stop offset="0.65" stop-color="#9b5de5"/>
      <stop offset="0.85" stop-color="#d84bbd"/>
      <stop offset="1" stop-color="#ef5350"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5b73f0" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#5b73f0" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#46506e"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="1278" height="378" rx="26" fill="#08090c" stroke="#191c24" stroke-width="2"/>
  <circle cx="440" cy="200" r="190" fill="url(#glow)"/>

  <!-- directed-graph motif: edges (arrowheads convey direction — an "outdegree") -->
  <g stroke="#46506e" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <line x1="160" y1="200" x2="409" y2="200"/>
    <line x1="314.8" y1="128.4" x2="413.1" y2="184.6"/>
    <line x1="313.9" y1="272.1" x2="413.1" y2="215.4"/>
    <line x1="466.9" y1="192.1" x2="591.8" y2="155.4"/>
    <line x1="461.5" y1="217.9" x2="546.2" y2="288.5"/>
  </g>

  <!-- nodes (drawn on top); size ~ visits, fill ~ how you arrived -->
  <g>
    <circle cx="140" cy="200" r="16" fill="#16a6c9"/>
    <circle cx="300" cy="120" r="13" fill="#5b73f0"/>
    <circle cx="300" cy="280" r="12" fill="#d84bbd"/>
    <circle cx="440" cy="200" r="24" fill="#9b5de5"/>
    <circle cx="610" cy="150" r="12" fill="#ef5350"/>
    <circle cx="560" cy="300" r="11" fill="#16a6c9"/>
  </g>

  <!-- wordmark + tagline -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="690" y="178" font-size="96" font-weight="700" fill="#f5f7fa" letter-spacing="-2">Outdegree</text>
    <text x="694" y="232" font-size="30" font-weight="400" fill="#9aa4b2">A local-only map of how you browse.</text>
    <text x="696" y="280" font-size="22" font-weight="600" fill="url(#spectrum)">100% local  ·  no network  ·  open source</text>
  </g>
</svg>
