<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Browsing Graph</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #11151c;
        --panel: #1a2029;
        --line: #2a3340;
        --fg: #e6edf3;
        --muted: #8b97a6;
        --accent: #4f8ef7;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: var(--bg);
        color: var(--fg);
        font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      #app { display: flex; flex-direction: column; height: 100vh; }
      .bg-toolbar {
        display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
        padding: 10px 14px; background: var(--panel);
        border-bottom: 1px solid var(--line);
      }
      .bg-toolbar h1 { font-size: 15px; margin: 0 12px 0 0; font-weight: 600; }
      .bg-toolbar label { color: var(--muted); font-size: 12px; }
      .bg-toolbar select, .bg-toolbar input, .bg-toolbar button {
        background: var(--bg); color: var(--fg);
        border: 1px solid var(--line); border-radius: 6px;
        padding: 4px 8px; font: inherit;
      }
      .bg-toolbar button { cursor: pointer; }
      .bg-toolbar button:hover { border-color: var(--accent); }
      .bg-tabs { display: flex; gap: 4px; padding: 8px 14px 0; background: var(--panel); }
      .bg-tabs button {
        background: transparent; color: var(--muted);
        border: none; border-bottom: 2px solid transparent;
        padding: 6px 10px; cursor: pointer; font: inherit;
      }
      .bg-tabs button.active { color: var(--fg); border-bottom-color: var(--accent); }
      .bg-body { flex: 1; min-height: 0; overflow: auto; padding: 14px; }
      canvas { display: block; background: var(--bg); width: 100%; height: 100%; }
      table { border-collapse: collapse; width: 100%; }
      th, td { text-align: left; padding: 4px 10px; border-bottom: 1px solid var(--line); }
      th { color: var(--muted); font-weight: 600; }
      .bg-empty { color: var(--muted); padding: 40px; text-align: center; }
    </style>
  </head>
  <body>
    <div id="app"><div class="bg-empty">Loading…</div></div>
    <script type="module" src="/src/dashboard.ts"></script>
  </body>
</html>
