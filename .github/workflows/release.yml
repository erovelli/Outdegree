name: Release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) to build the packed,
# wasm-opt-optimized extension and attach it to a GitHub Release for store upload.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the release + upload assets
  id-token: write # OIDC token for build-provenance attestation
  attestations: write # write the provenance attestation

jobs:
  release:
    name: Build + package extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust (stable + wasm32)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # Pin a known-good binaryen. The version apt ships on the runner is old
      # enough to mangle wasm-bindgen's externref table during `wasm-opt`, which
      # made the optimized dashboard crash at startup ("WebAssembly.Table.grow():
      # failed to grow table"). A pinned recent release optimizes it correctly.
      - name: Install binaryen (wasm-opt) — pinned
        run: |
          set -euo pipefail
          VER=version_119
          curl -fsSL "https://github.com/WebAssembly/binaryen/releases/download/${VER}/binaryen-${VER}-x86_64-linux.tar.gz" | tar xz
          echo "$PWD/binaryen-${VER}/bin" >> "$GITHUB_PATH"
          "$PWD/binaryen-${VER}/bin/wasm-opt" --version

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install JS deps
        run: npm ci

      # Fail fast if the release tag and the single-source version disagree (the
      # store requires monotonic versions, and the manifest derives from this).
      - name: Assert tag matches package.json version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          [ "$TAG" = "$PKG" ] || { echo "::error::tag v$TAG != package.json version $PKG"; exit 1; }
          echo "Releasing version $PKG"

      - name: Build WASM
        run: npm run build:wasm

      - name: Optimize WASM (wasm-opt -Os)
        run: |
          set -euo pipefail
          WASM=extension/src/wasm/browsing_graph_core_bg.wasm
          before=$(wc -c < "$WASM")
          # Plain -Os: binaryen reads wasm-bindgen's `target_features` section and
          # enables exactly those (reference-types etc.), preserving the externref
          # table. Do NOT add --all-features: it makes binaryen emit newer GC heap
          # types that older Chrome / Node reject ("Unknown heap type"). The pinned
          # binaryen above is what keeps the externref table growable. The smoke
          # test below guards both failure modes.
          wasm-opt -Os "$WASM" -o "$WASM"
          after=$(wc -c < "$WASM")
          echo "wasm-opt: $before -> $after bytes" >> "$GITHUB_STEP_SUMMARY"

      # Guard against ever shipping a non-launchable optimized bundle again:
      # instantiate the optimized WASM through the real wasm-bindgen glue, which
      # runs the externref-table init. If wasm-opt broke it, this traps and the
      # release fails here instead of publishing a dashboard that dies on open.
      - name: Smoke-test optimized WASM (init must not trap)
        run: node scripts/smoke-extension.mjs

      - name: Build extension (inlines the optimized WASM)
        run: npm run build:ext

      - name: Audit bundle for network surface (§12.7)
        run: |
          set -euo pipefail
          PATTERN='fetch\(|XMLHttpRequest|WebSocket|EventSource|navigator\.sendBeacon|importScripts'
          if grep -rIlE "$PATTERN" dist; then
            echo "::error::network surface found in dist/"
            exit 1
          fi
          EXT="$(grep -rIoE 'https?://[a-zA-Z0-9.-]+' dist | grep -vE 'w3\.org' || true)"
          if [ -n "$EXT" ]; then
            echo "::error::external URL(s) in dist/: $EXT"
            exit 1
          fi

      - name: Package dist/ → zip (reproducible)
        run: |
          set -euo pipefail
          ZIP="outdegree-${{ github.ref_name }}.zip"
          # Reproducible archive so a reviewer can rebuild and byte-diff: normalize
          # mtimes to the tagged commit, UTC, sorted entries, strip extra metadata.
          export TZ=UTC
          SDE="$(git log -1 --pretty=%ct)"
          find dist -exec touch -d "@$SDE" {} +
          (cd dist && find . -type f | sort | zip -X "../$ZIP" -@)
          echo "Built $ZIP ($(wc -c < "$ZIP") bytes)" >> "$GITHUB_STEP_SUMMARY"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: outdegree-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: outdegree-${{ github.ref_name }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
