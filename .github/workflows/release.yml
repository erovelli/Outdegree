name: Release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) to build the packed,
# wasm-opt-optimized extension and attach it to a GitHub Release for store upload.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the release + upload assets
  id-token: write # OIDC token for build-provenance attestation
  attestations: write # write the provenance attestation

jobs:
  release:
    name: Build + package extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust (stable + wasm32)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # Pin a known-good binaryen. The version apt ships on the runner is old
      # enough to mangle wasm-bindgen's externref table during `wasm-opt`, which
      # made the optimized dashboard crash at startup ("WebAssembly.Table.grow():
      # failed to grow table"). A pinned recent release optimizes it correctly.
      - name: Install binaryen (wasm-opt) — pinned
        run: |
          set -euo pipefail
          VER=version_119
          curl -fsSL "https://github.com/WebAssembly/binaryen/releases/download/${VER}/binaryen-${VER}-x86_64-linux.tar.gz" | tar xz
          echo "$PWD/binaryen-${VER}/bin" >> "$GITHUB_PATH"
          "$PWD/binaryen-${VER}/bin/wasm-opt" --version

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install JS deps
        run: npm ci

      # Fail fast if the release tag and the single-source version disagree (the
      # store requires monotonic versions, and the manifest derives from this).
      - name: Assert tag matches package.json version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          [ "$TAG" = "$PKG" ] || { echo "::error::tag v$TAG != package.json version $PKG"; exit 1; }
          echo "Releasing version $PKG"

      - name: Build WASM
        run: npm run build:wasm

      - name: Optimize WASM (wasm-opt -Os)
        run: |
          set -euo pipefail
          WASM=extension/src/wasm/browsing_graph_core_bg.wasm
          before=$(wc -c < "$WASM")
          # Plain -Os: binaryen reads wasm-bindgen's `target_features` section and
          # enables exactly those (reference-types etc.), preserving the externref
          # table. Do NOT add --all-features: it makes binaryen emit newer GC heap
          # types that older Chrome / Node reject ("Unknown heap type"). The pinned
          # binaryen above is what keeps the externref table growable. The smoke
          # test below guards both failure modes.
          wasm-opt -Os "$WASM" -o "$WASM"
          after=$(wc -c < "$WASM")
          echo "wasm-opt: $before -> $after bytes" >> "$GITHUB_STEP_SUMMARY"

      # Guard against ever shipping a non-launchable optimized bundle again:
      # instantiate the optimized WASM through the real wasm-bindgen glue, which
      # runs the externref-table init. If wasm-opt broke it, this traps and the
      # release fails here instead of publishing a dashboard that dies on open.
      - name: Smoke-test optimized WASM (init must not trap)
        run: node scripts/smoke-extension.mjs

      - name: Build extension (inlines the optimized WASM)
        run: npm run build:ext

      - name: Audit bundle for network surface (§12.7)
        run: |
          set -euo pipefail
          PATTERN='fetch\(|XMLHttpRequest|WebSocket|EventSource|navigator\.sendBeacon|importScripts'
          if grep -rIlE "$PATTERN" dist; then
            echo "::error::network surface found in dist/"
            exit 1
          fi
          EXT="$(grep -rIoE 'https?://[a-zA-Z0-9.-]+' dist | grep -vE 'w3\.org' || true)"
          if [ -n "$EXT" ]; then
            echo "::error::external URL(s) in dist/: $EXT"
            exit 1
          fi

      - name: Package dist/ → zip (reproducible)
        run: |
          set -euo pipefail
          ZIP="outdegree-${{ github.ref_name }}.zip"
          # Reproducible archive so a reviewer can rebuild and byte-diff: normalize
          # mtimes to the tagged commit, UTC, sorted entries, strip extra metadata.
          export TZ=UTC
          SDE="$(git log -1 --pretty=%ct)"
          find dist -exec touch -d "@$SDE" {} +
          (cd dist && find . -type f | sort | zip -X "../$ZIP" -@)
          echo "Built $ZIP ($(wc -c < "$ZIP") bytes)" >> "$GITHUB_STEP_SUMMARY"

      # Firefox artifact: overlay the two documented manifest deltas onto the SAME
      # optimized dist/ (byte-identical bundle — so the inlined WASM is exactly the
      # one the smoke test above already validated; there is no separate Firefox
      # WASM to smoke-test) and package with web-ext. `web-ext lint` fails on lint
      # errors only (known-acceptable warnings are allowed — see docs/PORTING.md).
      # web-ext is a devDependency; nothing from it enters the shipped bundle.
      - name: Build + package Firefox zip (dist-firefox overlay)
        run: |
          set -euo pipefail
          FF_ZIP="outdegree-firefox-${{ github.ref_name }}.zip"
          node scripts/build-firefox.mjs
          npx web-ext lint --source-dir dist-firefox
          npx web-ext build --source-dir dist-firefox --artifacts-dir . --filename "$FF_ZIP" --overwrite-dest
          echo "Built $FF_ZIP ($(wc -c < "$FF_ZIP") bytes)" >> "$GITHUB_STEP_SUMMARY"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            outdegree-${{ github.ref_name }}.zip
            outdegree-firefox-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # Chrome/Edge zip + the Firefox overlay zip. AMO submission stays manual
          # (not wired) — the Firefox zip is attached for manual upload / sideload.
          files: |
            outdegree-${{ github.ref_name }}.zip
            outdegree-firefox-${{ github.ref_name }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true

      # Hand the packaged zip to the store-publish job.
      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: outdegree-${{ github.ref_name }}.zip
          if-no-files-found: error

  # ── Submit the released zip to the Chrome Web Store ──────────────────────────
  # Talks to the Web Store API directly (no third-party action — keeps the
  # supply-chain surface small). Requires four repo secrets:
  #   CWS_EXTENSION_ID, CWS_CLIENT_ID, CWS_CLIENT_SECRET, CWS_REFRESH_TOKEN
  # If they're absent it skips cleanly, so tagging still produces a GitHub Release.
  # The API "publish" still goes through Google's normal review.
  #
  # Manual approval (optional): this job targets the `chrome-web-store`
  # environment. Add a required reviewer to that environment (repo Settings →
  # Environments) to make every release pause for a one-click approval before the
  # public store is touched. With no reviewer configured, it submits on tag.
  publish-store:
    name: Publish to Chrome Web Store
    needs: release
    runs-on: ubuntu-latest
    environment: chrome-web-store
    permissions: {}
    steps:
      - name: Download release zip
        uses: actions/download-artifact@v4
        with:
          name: extension-zip

      - name: Upload + submit to the Chrome Web Store
        env:
          EXT_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          ZIP: outdegree-${{ github.ref_name }}.zip
        run: |
          set -euo pipefail
          if [ -z "${REFRESH_TOKEN:-}" ] || [ -z "${EXT_ID:-}" ]; then
            echo "::warning::Chrome Web Store secrets not configured — skipping publish."
            exit 0
          fi

          echo "Requesting access token…"
          TOK=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d client_id="$CLIENT_ID" -d client_secret="$CLIENT_SECRET" \
            -d refresh_token="$REFRESH_TOKEN" -d grant_type=refresh_token)
          ACCESS_TOKEN=$(echo "$TOK" | jq -r '.access_token // empty')
          [ -n "$ACCESS_TOKEN" ] || { echo "::error::token request failed: $(echo "$TOK" | jq -rc '.error_description // .error // .')"; exit 1; }

          echo "Uploading $ZIP…"
          UP=$(curl -s -X PUT \
            -H "Authorization: Bearer $ACCESS_TOKEN" -H "x-goog-api-version: 2" \
            -T "$ZIP" \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/$EXT_ID")
          STATE=$(echo "$UP" | jq -r '.uploadState // "UNKNOWN"')
          echo "upload state: $STATE"
          [ "$STATE" = "SUCCESS" ] || { echo "::error::upload failed: $(echo "$UP" | jq -c '.itemError // .')"; exit 1; }

          echo "Submitting for review…"
          PUB=$(curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" -H "x-goog-api-version: 2" -H "Content-Length: 0" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/$EXT_ID/publish")
          if echo "$PUB" | jq -e '.status | index("OK")' >/dev/null 2>&1; then
            echo "✓ Submitted $ZIP to the Chrome Web Store for review." | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "::error::publish failed: $(echo "$PUB" | jq -c '.')"
            exit 1
          fi
