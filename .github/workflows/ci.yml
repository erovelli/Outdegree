name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only reads the repo (no job here writes back). Narrow the
# default GITHUB_TOKEN so a compromised step can't push, comment, or release.
permissions:
  contents: read

jobs:
  # ── Pure Rust core: tests + clippy + a wasm32 compile check ──────────────────
  rust:
    name: Rust core (test · clippy · wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust (stable + wasm32 + clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format check (rustfmt)
        run: cargo fmt --all -- --check

      - name: Test pure core
        run: cargo test -p browsing-graph-core

      - name: Clippy (native, warnings = errors)
        run: cargo clippy -p browsing-graph-core --lib --tests -- -D warnings

      # Stronger than a plain `cargo build --target wasm32`: --all-targets also
      # type-checks the wasm32-only tests (tests/browser.rs) and the store/render/
      # bridge modules, so wasm-gated breakage is caught here instead of only in
      # the slow headless-Chrome leg below.
      - name: Clippy + compile WASM shell & tests (wasm32, warnings = errors)
        run: cargo clippy -p browsing-graph-core --target wasm32-unknown-unknown --all-targets -- -D warnings

  # ── WASM shell: store + bridge round-trips in headless Chrome ─────────────────
  browser:
    name: WASM browser tests (headless Chrome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust (stable + wasm32)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # Provides a chromedriver matching the runner's preinstalled Chrome, on PATH,
      # which wasm-bindgen-test-runner uses to drive headless Chrome.
      - uses: nanasess/setup-chromedriver@v3

      - name: Run wasm-bindgen browser tests (store + bridge)
        run: wasm-pack test --headless --chrome crates/core

  # ── Extension: typecheck + full WASM/Vite build + network-surface audit ──────
  web:
    name: Extension (tsc · build · network audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust (stable + wasm32)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Unit tests (TypeScript / Vitest)
        run: npm run test:ts

      - name: Build extension (wasm-pack + vite)
        run: npm run build

      # Enforce the headline privacy guarantees against the *emitted*
      # dist/manifest.json (not just the source manifest.config.ts), so a build
      # plugin or a config change can't silently widen permissions / capability.
      - name: Audit emitted manifest for privacy invariants
        run: |
          set -euo pipefail
          M=dist/manifest.json
          test -f "$M" || { echo "::error::missing $M"; exit 1; }
          fail() { echo "::error::$1"; exit 1; }

          # No host access of any kind.
          [ "$(jq -c '.host_permissions // []' "$M")" = "[]" ] \
            || fail "host_permissions must be []: $(jq -c '.host_permissions' "$M")"
          [ "$(jq -c '.optional_host_permissions // []' "$M")" = "[]" ] \
            || fail "optional_host_permissions must be absent/[]"

          # Permissions (and optional_permissions) confined to the allowlist. The
          # Chrome build adds "favicon" (§F12, docs/adr/0006): it unlocks Chrome's
          # LOCAL favicon service at the extension's own origin
          # (chrome-extension://<id>/_favicon/) to label sites with their icons. It
          # makes NO network request (Chrome serves from its on-disk cache), so the
          # no-egress guarantee is intact and the bundle audit below still passes.
          # The Firefox job's allowlist is THREE (no favicon) — that service is
          # Chromium-only and the overlay strips the permission; see the firefox job.
          ALLOW='["webNavigation","storage","unlimitedStorage","favicon"]'
          for key in permissions optional_permissions; do
            EXTRA=$(jq -c --argjson a "$ALLOW" "[.${key}[]? | select(. as \$p | \$a | index(\$p) | not)]" "$M")
            [ "$EXTRA" = "[]" ] || fail "disallowed ${key}: $EXTRA"
          done

          # Never observe incognito.
          [ "$(jq -r '.incognito // ""' "$M")" = "not_allowed" ] \
            || fail "incognito must be not_allowed"

          # CSP must block all network connections.
          CSP=$(jq -r '.content_security_policy.extension_pages // ""' "$M")
          case "$CSP" in *"connect-src 'none'"*) : ;; *) fail "CSP missing connect-src 'none': $CSP";; esac

          # No content scripts or web-accessible resources (no page-context reach).
          [ "$(jq -c '.content_scripts // []' "$M")" = "[]" ] || fail "content_scripts present"
          [ "$(jq -c '.web_accessible_resources // []' "$M")" = "[]" ] || fail "web_accessible_resources present"

          echo "Manifest privacy invariants enforced: host_permissions=[], permissions⊆allowlist (incl. favicon), connect-src 'none', incognito not_allowed, no content_scripts/WAR."

      - name: Audit built bundle for network surface (§12.7)
        run: |
          set -euo pipefail
          # Any of these in the built bundle would mean a network path exists.
          PATTERN='fetch\(|XMLHttpRequest|WebSocket|EventSource|navigator\.sendBeacon|importScripts'
          if grep -rIlE "$PATTERN" dist; then
            echo "::error::network surface found in dist/ — see files above"
            exit 1
          fi
          # External http(s) URLs (allow the W3C XML namespace constant).
          EXT="$(grep -rIoE 'https?://[a-zA-Z0-9.-]+' dist | grep -vE 'w3\.org' || true)"
          if [ -n "$EXT" ]; then
            echo "::error::external URL(s) found in dist/:"
            echo "$EXT"
            exit 1
          fi
          echo "Bundle is clean: zero network surface."

      # Visibility + a runaway-growth guard on the inlined dashboard bundle. The
      # CI build runs without wasm-opt, so this is the *unoptimized* size; the
      # release workflow shrinks it with `wasm-opt -Os`. Ceiling is generous.
      - name: Bundle size budget
        run: |
          set -euo pipefail
          BUNDLE=$(wc -c < "$(ls dist/assets/dashboard-*.js)")
          BUDGET=$((5 * 1024 * 1024))
          echo "Dashboard bundle (pre-wasm-opt): $BUNDLE bytes / budget $BUDGET" >> "$GITHUB_STEP_SUMMARY"
          [ "$BUNDLE" -le "$BUDGET" ] || { echo "::error::dashboard bundle $BUNDLE exceeds budget $BUDGET"; exit 1; }

  # ── Firefox overlay: build the dist-firefox/ variant + same privacy audit ─────
  # Proves docs/PORTING.md's assertion in CI: the Firefox artifact is the same
  # compiled bundle with only the documented manifest deltas (background.scripts +
  # browser_specific_settings.gecko, plus stripping the Chromium-only "favicon"
  # permission — §F12) — so the privacy gate passes when pointed at
  # dist-firefox/manifest.json (with a three-permission allowlist, one fewer than
  # the Chrome job's four). `build:firefox` also runs `web-ext lint`,
  # which fails the job on lint errors (warnings are allowed — see the lint-warning
  # policy in docs/PORTING.md). web-ext is a devDependency only; nothing from it
  # enters the shipped bundle, so the network-surface audit above is unaffected.
  firefox:
    name: Firefox overlay (build:firefox · web-ext lint · manifest audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust (stable + wasm32)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install JS deps
        run: npm ci

      # Full build + overlay the two manifest deltas + `web-ext lint` (fails on
      # lint *errors*; the known-acceptable warnings do not fail — see PORTING.md).
      - name: Build Firefox overlay (build:firefox)
        run: npm run build:firefox

      # The SAME audit as the `web` job, byte-for-byte, pointed at the Firefox
      # manifest — the deltas never touch the audited keys, so it must pass.
      - name: Audit Firefox manifest for privacy invariants
        run: |
          set -euo pipefail
          M=dist-firefox/manifest.json
          test -f "$M" || { echo "::error::missing $M"; exit 1; }
          fail() { echo "::error::$1"; exit 1; }

          # No host access of any kind.
          [ "$(jq -c '.host_permissions // []' "$M")" = "[]" ] \
            || fail "host_permissions must be []: $(jq -c '.host_permissions' "$M")"
          [ "$(jq -c '.optional_host_permissions // []' "$M")" = "[]" ] \
            || fail "optional_host_permissions must be absent/[]"

          # Permissions confined to the allowlist. This is THREE — deliberately one
          # fewer than the Chrome (`web`) job, which allows a fourth, "favicon"
          # (§F12). The `_favicon` service is Chromium-only, so scripts/build-firefox.mjs
          # STRIPS the favicon permission from the overlay (declaring it would only
          # produce a Firefox install warning), and the dashboard's site-icons feature
          # runtime-guards on the permission being present — so it is cleanly inert
          # here. Asserting exactly three keeps that strip honest: if a future change
          # ever leaked "favicon" into dist-firefox/, this audit would fail.
          ALLOW='["webNavigation","storage","unlimitedStorage"]'
          for key in permissions optional_permissions; do
            EXTRA=$(jq -c --argjson a "$ALLOW" "[.${key}[]? | select(. as \$p | \$a | index(\$p) | not)]" "$M")
            [ "$EXTRA" = "[]" ] || fail "disallowed ${key}: $EXTRA"
          done

          # Never observe incognito.
          [ "$(jq -r '.incognito // ""' "$M")" = "not_allowed" ] \
            || fail "incognito must be not_allowed"

          # CSP must block all network connections.
          CSP=$(jq -r '.content_security_policy.extension_pages // ""' "$M")
          case "$CSP" in *"connect-src 'none'"*) : ;; *) fail "CSP missing connect-src 'none': $CSP";; esac

          # No content scripts or web-accessible resources (no page-context reach).
          [ "$(jq -c '.content_scripts // []' "$M")" = "[]" ] || fail "content_scripts present"
          [ "$(jq -c '.web_accessible_resources // []' "$M")" = "[]" ] || fail "web_accessible_resources present"

          echo "Firefox manifest privacy invariants enforced: host_permissions=[], permissions⊆allowlist (3, favicon stripped), connect-src 'none', incognito not_allowed, no content_scripts/WAR."

  # ── Supply-chain: RustSec advisory + license/source gate over Cargo.lock ──────
  # Dependabot proposes bumps; this fails the build on a known advisory in the
  # *current* committed lockfile, which a bump alone does not catch. Policy lives
  # in deny.toml.
  deny:
    name: Supply-chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: cargo-deny (advisories · bans · sources · licenses)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources licenses
