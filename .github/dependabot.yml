version: 2
updates:
  # GitHub Actions used by the CI / release workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]
    # Supply-chain hardening: only propose versions that have been published for
    # at least 7 days, so a compromised/yanked release is caught before adoption.
    cooldown:
      default-days: 7

  # npm dev dependencies (Vite, crxjs, TypeScript, types).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies", "javascript"]
    cooldown:
      default-days: 7

  # Rust crate dependencies for the core.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies", "rust"]
    cooldown:
      default-days: 7
